# Optional overlay — adds a Postgres container so you can spin the
# whole stack from scratch without an existing database.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# The base docker-compose.yml expects DATABASE_URL to point at an
# existing DB (the real labstack one). This overlay swaps DATABASE_URL
# to point at a containerised Postgres and adds the db service.
#
# Don't use this in production — the labstack data is missing, so the
# polling engine has nothing to act on.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opsflow}
      POSTGRES_USER: ${POSTGRES_USER:-opsflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opsflow_dev_password}
      TZ: Asia/Kolkata
      PGTZ: Asia/Kolkata
    volumes:
      - opsflow_pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opsflow} -d ${POSTGRES_DB:-opsflow}"]
      interval: 2s
      timeout: 3s
      retries: 30

  app:
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Override the base file's DATABASE_URL — point at the dev db
      # container instead of host.docker.internal.
      DATABASE_URL: postgresql://${POSTGRES_USER:-opsflow}:${POSTGRES_PASSWORD:-opsflow_dev_password}@db:5432/${POSTGRES_DB:-opsflow}?schema=taskos

volumes:
  opsflow_pgdata:
